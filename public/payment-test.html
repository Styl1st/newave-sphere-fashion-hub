<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test de Paiement Stripe</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 400px;
        width: 100%;
        padding: 40px;
      }

      .header {
        text-align: center;
        margin-bottom: 30px;
      }

      .icon {
        width: 60px;
        height: 60px;
        background: #f0f4ff;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        font-size: 30px;
      }

      h1 {
        font-size: 24px;
        color: #1a1a1a;
        margin-bottom: 10px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 500;
        color: #333;
      }

      input {
        width: 100%;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 6px;
        font-size: 14px;
        transition: border-color 0.3s;
      }

      input:focus {
        outline: none;
        border-color: #667eea;
      }

      .info-box {
        background: #f5f7ff;
        border-left: 4px solid #667eea;
        padding: 15px;
        border-radius: 4px;
        margin: 20px 0;
        font-size: 13px;
        color: #555;
      }

      .info-box strong {
        display: block;
        margin-bottom: 8px;
        color: #333;
      }

      .info-box ul {
        margin-left: 20px;
      }

      .info-box li {
        margin: 4px 0;
      }

      button {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s;
        margin-top: 20px;
      }

      button:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-right: 8px;
        vertical-align: middle;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .error {
        background: #fee;
        border: 1px solid #fcc;
        color: #c33;
        padding: 12px;
        border-radius: 6px;
        margin: 20px 0;
        font-size: 14px;
        display: none;
      }

      .error.show {
        display: block;
      }

      .success {
        background: #efe;
        border: 1px solid #cfc;
        color: #3c3;
        padding: 12px;
        border-radius: 6px;
        margin: 20px 0;
        font-size: 14px;
        display: none;
      }

      .success.show {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="icon">💳</div>
        <h1>Test de Paiement</h1>
      </div>

      <div id="error" class="error"></div>
      <div id="success" class="success"></div>

      <form id="paymentForm">
        <div class="form-group">
          <label for="amount">Montant du test (€)</label>
          <input
            type="number"
            id="amount"
            name="amount"
            value="10.00"
            min="0.50"
            step="0.01"
            required
          />
        </div>

        <div class="info-box">
          <strong>Cartes de test Stripe:</strong>
          <ul>
            <li>✓ Succès: <code>4242 4242 4242 4242</code></li>
            <li>✗ Échec: <code>4000 0000 0000 0002</code></li>
            <li>Date: N'importe quelle future</li>
            <li>CVC: 123 (ou n'importe quel nombre)</li>
          </ul>
        </div>

        <button type="submit" id="submitBtn">
          <span id="buttonText">Tester le paiement - 10.00 €</span>
        </button>
      </form>
    </div>

    <script>
      const form = document.getElementById("paymentForm");
      const amountInput = document.getElementById("amount");
      const submitBtn = document.getElementById("submitBtn");
      const buttonText = document.getElementById("buttonText");
      const errorDiv = document.getElementById("error");
      const successDiv = document.getElementById("success");

      // Update button text when amount changes
      amountInput.addEventListener("change", () => {
        updateButtonText();
      });

      amountInput.addEventListener("input", () => {
        updateButtonText();
      });

      function updateButtonText() {
        const amount = parseFloat(amountInput.value) || 0;
        buttonText.textContent = `Tester le paiement - ${amount.toFixed(2)} €`;
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        // Clear previous messages
        errorDiv.classList.remove("show");
        successDiv.classList.remove("show");

        submitBtn.disabled = true;
        submitBtn.innerHTML =
          '<span class="spinner"></span>Création du paiement...';

        try {
          const amount = parseFloat(amountInput.value);

          if (!amount || amount < 0.5) {
            throw new Error("Le montant doit être au minimum 0.50 €");
          }

          // Get the current user from localStorage or session
          const userJson = localStorage.getItem(
            "sb-dzzswsbdthbsaapmilbq-auth-token",
          );

          if (!userJson) {
            throw new Error(
              "Vous devez être connecté pour tester les paiements",
            );
          }

          const userData = JSON.parse(userJson);
          const userId = userData.user.id;

          // Call Supabase function
          const response = await fetch(
            "https://dzzswsbdthbsaapmilbq.supabase.co/functions/v1/create-checkout",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${userData.access_token}`,
              },
              body: JSON.stringify({
                items: [
                  {
                    productId: "test-product-" + Date.now(),
                    name: "Produit de Test",
                    brand: "Newave Fashion",
                    price: amount,
                    quantity: 1,
                    image: "https://via.placeholder.com/150",
                    sellerId: userId,
                  },
                ],
              }),
            },
          );

          if (!response.ok) {
            const error = await response.json();
            throw new Error(
              error.error || "Erreur lors de la création de la session",
            );
          }

          const data = await response.json();

          if (data.url) {
            successDiv.textContent = "Redirection vers Stripe...";
            successDiv.classList.add("show");
            setTimeout(() => {
              window.location.href = data.url;
            }, 1500);
          } else {
            throw new Error("Aucune URL de paiement reçue");
          }
        } catch (error) {
          console.error("Erreur:", error);
          errorDiv.textContent = error.message || "Une erreur s'est produite";
          errorDiv.classList.add("show");

          submitBtn.disabled = false;
          updateButtonText();
          submitBtn.innerHTML = buttonText.innerHTML;
        }
      });
    </script>
  </body>
</html>
