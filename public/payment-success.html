<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paiement réussi</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #3b82f6);
      color: #111827;
    }
    .card {
      width: min(520px, 90vw);
      background: white;
      border-radius: 24px;
      box-shadow: 0 30px 80px rgba(15, 23, 42, 0.2);
      padding: 36px;
      text-align: center;
    }
    .icon {
      width: 72px;
      height: 72px;
      border-radius: 9999px;
      background: #dcfce7;
      color: #16a34a;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      font-size: 32px;
    }
    h1 {
      margin: 0;
      font-size: 2rem;
      color: #0f172a;
    }
    p {
      color: #4b5563;
      line-height: 1.75;
      margin: 20px 0;
    }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 9999px;
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.2s, background 0.2s;
    }
    .button:hover {
      transform: translateY(-1px);
      background: #1d4ed8;
    }
    .details {
      margin-top: 18px;
      font-size: 0.95rem;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>Paiement reçu</h1>
    <p>Merci pour votre achat ! Votre commande a bien été prise en compte.</p>
    <a class="button" href="/">Retour à l'accueil</a>
    <div class="details">Vous pouvez fermer cette page ou revenir au site pour voir vos achats.</div>
  </div>
</body>
</html>
